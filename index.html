<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tic Tac Toe AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }
        
        body {
            font-family: Segoe UI, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #312e81, #0f766e);
            background-size: 400% 400%;
            animation: bg 15s ease infinite;
            overflow: hidden;
            color: #fff
        }
        
        @keyframes bg {
            0% {
                background-position: 0 50%
            }
            50% {
                background-position: 100% 50%
            }
            100% {
                background-position: 0 50%
            }
        }
        
        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
            opacity: .25;
            animation: float 12s linear infinite
        }
        
        @keyframes float {
            from {
                transform: translateY(100vh)
            }
            to {
                transform: translateY(-100px)
            }
        }
        
        .container {
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .4)
        }
        
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: auto;
            background: linear-gradient(135deg, #6366f1, #14b8a6);
            position: relative;
            animation: updown 3s infinite
        }
        
        @keyframes updown {
            50% {
                transform: translateY(-8px)
            }
        }
        
        .eye {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 32px;
            animation: blink 4s infinite
        }
        
        .left {
            left: 24px
        }
        
        .right {
            right: 24px
        }
        
        @keyframes blink {
            48%,
            52% {
                height: 2px
            }
        }
        
        h2 {
            margin: 10px 0
        }
        
        #status {
            margin: 10px;
            font-weight: bold
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            margin: 15px auto
        }
        
        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, .1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border-radius: 15px;
            cursor: pointer;
            transition: .3s
        }
        
        .cell:hover {
            transform: scale(1.05)
        }
        
        .x {
            color: #a78bfa;
            text-shadow: 0 0 15px #a78bfa
        }
        
        .o {
            color: #2dd4bf;
            text-shadow: 0 0 15px #2dd4bf
        }
        
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            margin: 5px;
            background: linear-gradient(135deg, #6366f1, #14b8a6);
            color: #fff;
            cursor: pointer
        }
        
        .score {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px
        }
        
        .card {
            background: rgba(255, 255, 255, .08);
            padding: 10px 15px;
            border-radius: 12px
        }
        
        #winner {
            color: #22c55e
        }
        
        canvas {
            position: fixed;
            inset: 0;
            pointer-events: none
        }
    </style>
</head>

<body>
    <canvas id="confetti"></canvas>

    <div class="container">
        <div class="avatar">
            <div class="eye left"></div>
            <div class="eye right"></div>
        </div>

        <h2>🤖 Minimax AI</h2>

        <div class="score">
            <div class="card">You: <span id="you">0</span></div>
            <div class="card">Draw: <span id="draw">0</span></div>
            <div class="card">AI: <span id="ai">0</span></div>
        </div>

        <div id="status">Your Turn</div>

        <div class="board" id="board"></div>

        <button onclick="resetGame()">New Game</button>
        <button id="musicBtn">🎵 Music ON/OFF</button>

        <audio id="bgMusic" loop>
<source src="" type="audio/mpeg">
</audio>

        <div id="winner"></div>
    </div>

    <script>
        for (let i = 0; i < 30; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (8 + Math.random() * 10) + 's';
            document.body.appendChild(p);
        }

        const boardEl = document.getElementById("board");
        const statusEl = document.getElementById("status");
        let board = Array(9).fill("");
        let gameOver = false;
        let scores = {
            you: 0,
            ai: 0,
            draw: 0
        };

        for (let i = 0; i < 9; i++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.i = i;
            cell.onclick = () => move(i);
            boardEl.appendChild(cell);
        }

        const wins = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        function check(b) {
            for (let w of wins) {
                const [a, b1, c] = w;
                if (b[a] && b[a] === b[b1] && b[a] === b[c]) return b[a];
            }
            if (b.every(x => x)) return "draw";
            return null;
        }

        function minimax(b, isMax) {
            let r = check(b);
            if (r === "O") return 10;
            if (r === "X") return -10;
            if (r === "draw") return 0;

            if (isMax) {
                let best = -999;
                for (let i = 0; i < 9; i++) {
                    if (!b[i]) {
                        b[i] = "O";
                        best = Math.max(best, minimax(b, false));
                        b[i] = "";
                    }
                }
                return best;
            } else {
                let best = 999;
                for (let i = 0; i < 9; i++) {
                    if (!b[i]) {
                        b[i] = "X";
                        best = Math.min(best, minimax(b, true));
                        b[i] = "";
                    }
                }
                return best;
            }
        }

        function bestMove() {
            let best = -999,
                move;
            for (let i = 0; i < 9; i++) {
                if (!board[i]) {
                    board[i] = "O";
                    let score = minimax(board, false);
                    board[i] = "";
                    if (score > best) {
                        best = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function render() {
            document.querySelectorAll(".cell").forEach((c, i) => {
                c.textContent = board[i];
                c.className = "cell";
                if (board[i] === "X") c.classList.add("x");
                if (board[i] === "O") c.classList.add("o");
            });
        }

        function move(i) {
            if (gameOver || board[i]) return;
            board[i] = "X";
            render();
            let r = check(board);
            if (r) {
                end(r);
                return;
            }
            statusEl.textContent = "AI Thinking...";
            setTimeout(() => {
                board[bestMove()] = "O";
                render();
                let r2 = check(board);
                if (r2) {
                    end(r2);
                    return;
                }
                statusEl.textContent = "Your Turn";
            }, 400);
        }

        function end(r) {
            gameOver = true;
            if (r === "X") {
                scores.you++;
                document.getElementById("winner").textContent = "🎉 You Win!";
                launchConfetti();
            } else if (r === "O") {
                scores.ai++;
                document.getElementById("winner").textContent = "🤖 AI Wins!";
            } else {
                scores.draw++;
                document.getElementById("winner").textContent = "🤝 Draw!";
            }
            document.getElementById("you").textContent = scores.you;
            document.getElementById("ai").textContent = scores.ai;
            document.getElementById("draw").textContent = scores.draw;
        }

        function resetGame() {
            board = Array(9).fill("");
            gameOver = false;
            document.getElementById("winner").textContent = "";
            statusEl.textContent = "Your Turn";
            render();
        }

        const canvas = document.getElementById("confetti");
        const ctx = canvas.getContext("2d");
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        let conf = [];

        function launchConfetti() {
            conf = [];
            for (let i = 0; i < 150; i++) {
                conf.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    r: Math.random() * 6 + 3,
                    dx: (Math.random() - .5) * 6,
                    dy: Math.random() * 5 + 3,
                    c: `hsl(${Math.random()*360},100%,50%)`
                });
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            conf.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;
                ctx.fillStyle = p.c;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            });
            conf = conf.filter(x => x.y < canvas.height);
            if (conf.length) requestAnimationFrame(animate);
        }

        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");
        let playing = false;
        btn.onclick = () => {
            if (!playing) {
                music.play().catch(() => {});
            } else {
                music.pause();
            }
            playing = !playing;
        };
    </script>
</body>

</html>
